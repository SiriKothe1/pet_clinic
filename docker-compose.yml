services:
  petclinic:
    build: .
    container_name: petclinic_v2
    user: "${HOST_UID}:${HOST_GID}"
    ports:
      - "8000:8000"
    volumes:
      - /home/rdauser/petclinic_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/petclinic.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  petclinic_data:
    driver: local
